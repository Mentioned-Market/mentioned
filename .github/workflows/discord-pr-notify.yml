name: Discord PR Notification

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send PR notification to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"

          # Truncate body if too long for Discord
          PR_BODY_SHORT=$(echo "$PR_BODY" | head -c 500)

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔀 New PR: $PR_TITLE\",
                \"description\": \"$PR_BODY_SHORT\",
                \"url\": \"$PR_URL\",
                \"color\": 5814783,
                \"fields\": [
                  {\"name\": \"Author\", \"value\": \"$PR_AUTHOR\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"mentioned · GitHub\"}
              }]
            }"
